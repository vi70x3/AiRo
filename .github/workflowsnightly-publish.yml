name: Nightly Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-nightly:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-args: '--frozen-lockfile'

      - name: Forge numeric Nightly version
        id: version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: echo "number=$(( 5500 + ${RUN_NUMBER} ))" >> $GITHUB_OUTPUT

      - name: Patch package.json version
        env:
          VERSION_NUMBER: ${{ steps.version.outputs.number }}
        run: |
          node <<'EOF'
            const fs = require('fs');
            const path = require('path');
            const pkgPath = path.join(__dirname, 'apps', 'vscode-nightly', 'package.nightly.json');
            const pkg = JSON.parse(fs.readFileSync(pkgPath,'utf8'));
            const [maj, min] = pkg.version.split('.');
            pkg.version = `${maj}.${min}.${process.env.VERSION_NUMBER}`;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            console.log(`🔖 Nightly version set to ${pkg.version}`);
          EOF

      - name: Build VSIX
        run: pnpm vsix:nightly

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view nightly &> /dev/null; then
            echo "Deleting existing nightly release..."
            gh release delete nightly --yes || true
            git push origin :refs/tags/nightly || true
          else
            echo "No existing nightly release to delete."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NUMBER: ${{ steps.version.outputs.number }}
        run: |
          VSIX_FILE="bin/$(ls bin | head -n1)"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DATE=$(date -u +'%Y-%m-%d')

          gh release create nightly \
            --title "Nightly v0.0.${VERSION_NUMBER} (${DATE})" \
            --notes "Automated nightly build from commit ${SHORT_SHA}.

            **Version:** 0.0.${VERSION_NUMBER}
            **Date:** ${DATE}
            **Commit:** ${COMMIT_SHA}

            > ⚠️ This is a pre-release nightly build. It may contain bugs or incomplete features. Install by downloading the .vsix below and running \`code --install-extension roo-code-nightly-0.0.${VERSION_NUMBER}.vsix\`" \
            --prerelease \
            --target main \
            "$VSIX_FILE"
